<script type="module">
    import { get } from "https://cdn.jsdelivr.net/gh/crootjs/lib@0.0.3/api.js";

    // Kita tes pakai API publik yang sangat stabil
    const url = "https://api.github.com/users/atsgeng";

    get(url, (data) => {
        // Jika berhasil, teks "Sedang memuat" akan langsung berganti
        if (data) {
            document.getElementById("app").innerHTML = "Data Berhasil Masuk: " + (data.name || data.login);
        } else {
            document.getElementById("app").innerHTML = "Data kosong atau API limit.";
        }
    }).catch(err => {
        document.getElementById("app").innerHTML = "Error: " + err;
    });
</script>
