<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Uji API CrootJS</title>
</head>
<body>

    <div id="content">Menunggu data dari CrootJS...</div>

    <script type="module">
        // Import fungsi 'get' dari library
        import { get } from "https://cdn.jsdelivr.net/gh/crootjs/lib@0.0.3/api.js";

        // URL API (pakai info organisasi kamu)
        const url = "https://api.github.com/orgs/atsgeng";

        // Di croot.js v0.0.3, fungsi get langsung mengisi elemen HTML
        // Parameter: (URL, ID_ELEMEN_HTML)
        get(url, "content");
    </script>

</body>
</html>
